<div class="sidebar" [class.collapsed]="isCollapsed">
  <div class="sidebar-header">
    <span class="brand-icon">RG </span>
    <span class="brand-full">Rapid Global</span>
  </div>

  <div *ngFor="let module of sidebarData">

    <div class="nav-link text-white d-flex justify-content-between align-items-center"
         (click)="onModuleClick(module)"
         [class.active-module]="activeModuleId === module.id">

      <span class="nav-link-content">
        <i class="fa" [ngClass]="module.icon || 'fa-gauge'"></i>
        <b class="nav-text">{{ module.name }}</b>  <!-- ← separated -->
      </span>

      <!-- Chevron also hidden when collapsed -->
      <i *ngIf="module.menus.length"
         class="fa nav-chevron"
         [class.fa-chevron-down]="activeModuleId === module.id"
         [class.fa-chevron-right]="activeModuleId !== module.id">
      </i>

    </div>

    <ul class="nav flex-column ps-3"
        *ngIf="activeModuleId === module.id && module.menus.length">
      <li *ngFor="let menu of module.menus">
        <a class="nav-link text-white nav-menu-item"
           [routerLink]="menu.route"
           routerLinkActive="active-menu">
          <span class="nav-text">{{ menu.name }}</span>  <!-- ← wrap menu text too -->
        </a>
      </li>
    </ul>

  </div>
</div>
